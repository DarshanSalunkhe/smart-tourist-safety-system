<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Tourist Safety Monitoring & Incident Response System">
  <meta name="project" content="smart-tourist-safety-v2">
  <title>🛡️ SafeTrip — Smart Tourist Safety</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/landing.css">
  <style>
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 9999;
      font-family: 'Inter', sans-serif;
    }
    #loading::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(79,70,229,.25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(139,92,246,.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .loading-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #4f46e5, #818cf8);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(79,70,229,.5);
      animation: logoFloat 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    #loading h1 {
      font-size: 1.75rem; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 0.4rem;
      position: relative; z-index: 1;
    }
    #loading .subtitle {
      font-size: 0.875rem; opacity: 0.5;
      margin-bottom: 2.5rem; position: relative; z-index: 1;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      position: relative; z-index: 1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading .error {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      padding: 1rem 1.5rem; border-radius: 12px;
      margin-top: 2rem; max-width: 420px;
      font-size: 0.875rem; position: relative; z-index: 1;
    }
    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div class="loading-logo">🛡️</div>
    <h1>SafeTrip</h1>
    <p class="subtitle">Smart Tourist Safety System</p>
    <div class="spinner"></div>
    <div id="loadingError" class="error" style="display: none;">
      <strong>⚠️ Error:</strong> <span id="errorMessage"></span><br>
      <button onclick="location.reload()" style="margin-top: 0.75rem; padding: 0.5rem 1.25rem; background: white; color: #ef4444; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
        Reload
      </button>
    </div>
  </div>
  
  <!-- Main App -->
  <div id="app"></div>
  
  <script type="module" src="/src/main.js"></script>
  
  <!-- Project Identifier & Error Handler -->
  <script>
    console.log('%c🛡️ Smart Tourist Safety System v2.0', 'color: #2563eb; font-size: 20px; font-weight: bold;');
    console.log('%cIf you see MediMind, clear your browser cache!', 'color: #ef4444; font-size: 14px;');
    console.log('%cProject Directory: SMART TOURIST', 'color: #10b981; font-size: 12px;');
    
    // Auto-hide loading screen after 10 seconds if still visible
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading && loading.style.display !== 'none') {
        console.error('⚠️ Loading took too long, showing error');
        const errorDiv = document.getElementById('loadingError');
        const errorMsg = document.getElementById('errorMessage');
        if (errorDiv && errorMsg) {
          errorMsg.textContent = 'Loading timeout. Check console for errors (Press F12).';
          errorDiv.style.display = 'block';
        }
      }
    }, 10000);
    
    // Global error handler
    window.addEventListener('error', (e) => {
      console.error('Global error:', e.error);
      const loading = document.getElementById('loading');
      const errorDiv = document.getElementById('loadingError');
      const errorMsg = document.getElementById('errorMessage');
      if (loading && errorDiv && errorMsg) {
        errorMsg.textContent = e.error?.message || 'Unknown error occurred';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
